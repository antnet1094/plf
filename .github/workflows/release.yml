name: Build and Release PLF Bindings

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-bindings:
    name: Build Native Bindings
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            ext: .so
            target: libplf.so
          - os: windows-latest
            ext: .dll
            target: libplf.dll
          - os: macos-latest
            ext: .dylib
            target: libplf.dylib

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Windows MinGW (GCC)
        if: runner.os == 'Windows'
        run: |
          choco install mingw -y
          echo "C:\ProgramData\chocolatey\bin" >> $GITHUB_PATH

      - name: Build Native Library (C-Shared)
        run: go build -o ${{ matrix.target }} -buildmode=c-shared bridge.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binding
          path: ${{ matrix.target }}

  release:
    needs: build-bindings
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            */*.so
            */*.dll
            */*.dylib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
